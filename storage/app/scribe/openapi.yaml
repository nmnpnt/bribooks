      operationId: dELETEapibooksid
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the book.'
        example: 16
        required: true
        schema:
          type: integer
  '/api/books/{book_id}/versions':
    post:
      summary: "POST /api/books/{id}/versions\nCreate a new version snapshot of the current book state."
      operationId: pOSTapibooksidversionsCreateANewVersionSnapshotOfTheCurrentBookState
