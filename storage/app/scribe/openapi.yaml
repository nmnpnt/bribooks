                description:
                  type: string
                  description: ''
                  example: 'Eius et animi quos velit et.'
                  nullable: true
                order:
                  type: integer
                  description: 'Must be at least 0.'
                  example: 60
                  nullable: true
              required:
                - title
      security: []
    parameters:
      -
        in: path
        name: book_id
        description: 'The ID of the book.'
        example: 16
        required: true
        schema:
          type: integer
  '/api/chapters/{chapter_id}':
    put:
      summary: 'PUT /api/chapters/{id}'
      operationId: pUTapichaptersid
      description: ''
      parameters: []
