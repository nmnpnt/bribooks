        description: 'The ID of the book.'
        example: 16
        required: true
        schema:
          type: integer
      -
        in: path
        name: version_id
        description: 'The ID of the version.'
        example: 16
        required: true
        schema:
          type: integer
  '/api/books/{book_id}/versions/{version_id}/restore':
    post:
      summary: "POST /api/books/{id}/versions/{versionId}/restore\nRollback book content to a previous version."
      operationId: pOSTapibooksidversionsversionIdrestoreRollbackBookContentToAPreviousVersion
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      security: []
    parameters:
