                label:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: b
                  nullable: true
                change_notes:
                  type: string
                  description: 'Must not be greater than 1000 characters.'
                  example: 'n'
                  nullable: true
      security: []
    get:
      summary: 'GET /api/books/{id}/versions'
