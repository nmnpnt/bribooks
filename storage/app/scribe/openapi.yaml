      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                manuscript:
                  type: string
                  format: binary
                  description: 'Must be a file. Must not be greater than 20480 kilobytes.'
              required:
                - manuscript
      security: []
    parameters:
      -
        in: path
        name: book_id
        description: 'The ID of the book.'
        example: 16
        required: true
