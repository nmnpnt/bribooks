          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: ''
                  example: architecto
                content_type:
                  type: string
                  description: ''
                  example: text
                  enum:
                    - html
                    - text
                    - markdown
                  nullable: true
                page_number:
                  type: integer
                  description: 'Must be at least 1.'
                  example: 22
