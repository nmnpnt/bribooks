  /api/books:
    get:
      summary: 'GET /api/books'
      operationId: gETapibooks
      description: ''
      parameters: []
      responses:
        500:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Server Error'
                properties:
                  message:
                    type: string
                    example: 'Server Error'
      tags:
        - Endpoints
      security: []
    post:
      summary: 'POST /api/books'
      operationId: pOSTapibooks
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                description:
                  type: string
                  description: ''
                  example: 'Eius et animi quos velit et.'
                  nullable: true
                genre:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: v
                  nullable: true
                language:
                  type: string
                  description: 'Must be 2 characters.'
                  example: dl
                  nullable: true
              required:
                - title
      security: []
  '/api/books/{id}':
    get:
      summary: 'GET /api/books/{id}'
      operationId: gETapibooksid
